services:
  postgres:
    image: postgres:16-alpine
    container_name: budget-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ai_budget}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - budget-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_budget"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: budget-redis-prod
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - budget-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 96M

  migrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: migrator
    container_name: budget-migrator
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_budget}?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - budget-network
    profiles:
      - migrate

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: budget-api-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_budget}?schema=public"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - budget-network
    deploy:
      resources:
        limits:
          memory: 512M

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.ai-budget.pl/api/v1}
        NEXT_PUBLIC_BASE_PATH: ""
    container_name: budget-admin-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3001"
    depends_on:
      - api
    networks:
      - budget-network
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  redis_data:

networks:
  budget-network:
    driver: bridge

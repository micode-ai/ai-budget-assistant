name: Mobile EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

concurrency:
  group: mobile-eas-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write google-services.json
        working-directory: apps/mobile
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Determine build profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.profile }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/development" ]; then
            echo "name=preview" >> $GITHUB_OUTPUT
          else
            echo "name=production" >> $GITHUB_OUTPUT
          fi

      - name: Run EAS Build
        working-directory: apps/mobile
        run: eas build --platform android --profile ${{ steps.profile.outputs.name }} --non-interactive --no-wait

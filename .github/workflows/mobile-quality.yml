name: Mobile Quality Checks

on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/shared-types/**'
      - 'packages/shared-utils/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main, development]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared-types/**'
      - 'packages/shared-utils/**'

concurrency:
  group: mobile-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npx turbo lint --filter=@budget/mobile

      - run: npx turbo typecheck --filter=@budget/mobile

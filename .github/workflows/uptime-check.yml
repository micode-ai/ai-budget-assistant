name: Uptime Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: uptime-check
  cancel-in-progress: true

jobs:
  ping:
    name: Ping ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: db
            url: https://api.ai-budget.pl/api/v1/health
          - label: ai
            url: https://api.ai-budget.pl/api/v1/health/ai
    steps:
      - name: Hit ${{ matrix.url }}
        id: probe
        env:
          URL: ${{ matrix.url }}
        run: |
          set +e
          RESP_FILE=$(mktemp)
          STATUS=$(curl -sS -m 15 --retry 2 --retry-delay 5 \
                        -o "$RESP_FILE" \
                        -w "%{http_code}|%{time_total}" \
                        "$URL")
          CURL_EXIT=$?
          CODE="${STATUS%%|*}"
          TIME="${STATUS##*|}"
          BODY=$(head -c 500 "$RESP_FILE")
          rm -f "$RESP_FILE"

          echo "url=$URL"
          echo "http_code=$CODE"
          echo "time_total=$TIME"
          echo "curl_exit=$CURL_EXIT"
          echo "body=$BODY"

          {
            echo "url=$URL"
            echo "http_code=$CODE"
            echo "time_total=$TIME"
            echo "curl_exit=$CURL_EXIT"
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$CODE" = "200" ]; then
            exit 0
          fi
          exit 1

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LABEL: ${{ matrix.label }}
          URL: ${{ steps.probe.outputs.url }}
          CODE: ${{ steps.probe.outputs.http_code }}
          TIME: ${{ steps.probe.outputs.time_total }}
          CURL_EXIT: ${{ steps.probe.outputs.curl_exit }}
          BODY: ${{ steps.probe.outputs.body }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret missing — cannot alert" >&2
            exit 1
          fi
          MESSAGE=$(printf '\xF0\x9F\x9A\xA8 *PROD %s DOWN* \xF0\x9F\x9A\xA8\n\n*URL*: `%s`\n*HTTP*: `%s`  *time*: `%ss`  *curl exit*: `%s`\n\n*Body* (first 500B):\n```\n%s\n```\n\n[GitHub run](%s)' \
            "$(echo "$LABEL" | tr '[:lower:]' '[:upper:]')" "$URL" "$CODE" "$TIME" "$CURL_EXIT" "${BODY:-(empty)}" "$RUN_URL")
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MESSAGE}"

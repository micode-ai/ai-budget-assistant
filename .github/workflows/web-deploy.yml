name: Deploy Web to VPS

on:
  push:
    branches: [development]
  workflow_dispatch:

concurrency:
  group: deploy-web-production
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Build & deploy static web app
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        env:
          # Baked into the bundle at build time — the web app talks to prod API.
          EXPO_PUBLIC_API_URL: https://api.ai-budget.pl/api/v1
        run: bash scripts/build-web.sh

      - name: Verify build output
        run: |
          set -e
          test -f apps/mobile/dist/index.html || { echo "::error::dist/index.html missing — aborting before deploy"; exit 1; }
          ls apps/mobile/dist/_expo/static/js/web/*.js >/dev/null 2>&1 || { echo "::error::no JS bundle in dist — aborting"; exit 1; }
          echo "dist OK: $(du -sh apps/mobile/dist | cut -f1)"

      - name: Assemble apex tree (landing + blog)
        run: |
          set -e
          # apex ai-budget.pl = static marketing landing (9 langs, indexable) + /blog (ABA-269).
          # Committed builds (regenerate then commit):
          #   landing apex: LANDING_BASE= ROBOTS="index,follow,max-image-preview:large" python docs/marketing/landing/build_landing.py
          #   blog:         python docs/marketing/seo/build_blog.py
          rm -rf apex && mkdir -p apex
          cp -r docs/marketing/landing/site/. apex/
          cp -r docs/marketing/seo/site/blog apex/blog
          test -f apex/index.html       || { echo "::error::landing index.html missing"; exit 1; }
          test -f apex/blog/index.html  || { echo "::error::blog/index.html missing"; exit 1; }
          test -f apex/sitemap.xml      || { echo "::error::sitemap.xml missing"; exit 1; }
          echo "apex tree: $(du -sh apex | cut -f1)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy app (SPA) to app.ai-budget.pl
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new" \
            apps/mobile/dist/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/ai-budget-app/html/"

      - name: Deploy apex (landing + blog) to ai-budget.pl
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new" \
            apex/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/ai-budget-web/html/"

      - name: Verify sites are live
        run: |
          set -e
          check() {
            for i in $(seq 1 10); do
              code=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 8 "$1" || echo "000")
              [ "$code" = "200" ] && { echo "$1 -> OK ($code)"; return 0; }
              echo "  ($i/10) $1 -> $code, retry in 3s..."; sleep 3
            done
            echo "::error::$1 did not return 200 after deploy"; return 1
          }
          check https://ai-budget.pl/
          check https://ai-budget.pl/blog/
          check https://app.ai-budget.pl/

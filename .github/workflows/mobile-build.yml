name: Mobile Build & Publish

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - preview
          - production
      submit:
        description: 'Submit to Google Play after build'
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Check release version
        # Bare project: Google Play shows android/app/build.gradle versionName,
        # not app.json. Fail fast if they drifted (or the version wasn't bumped
        # above the latest release tag) so we never ship 1.0.0 by accident.
        if: inputs.profile == 'production'
        working-directory: apps/mobile
        run: node scripts/check-release-version.js

      - name: Build AAB locally
        # GOOGLE_SERVICES_JSON is consumed by `eas-build-pre-install` (see
        # apps/mobile/scripts/write-google-services.js). The hook runs inside
        # EAS's build workdir AFTER archive extraction and BEFORE Gradle, so
        # the file lands at android/app/google-services.json without ever
        # touching the repo or the runner's tracked workspace.
        working-directory: apps/mobile
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: eas build --platform android --profile ${{ inputs.profile }} --local --non-interactive --output ./app-release.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ inputs.profile }}
          path: apps/mobile/app-release.aab
          retention-days: 30

      - name: Write Google Play service account key
        if: inputs.submit && inputs.profile == 'production'
        working-directory: apps/mobile
        run: echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}' > google-play-service-account.json

      - name: Submit to Google Play
        if: inputs.submit && inputs.profile == 'production'
        working-directory: apps/mobile
        run: eas submit --platform android --profile production --path ./app-release.aab --non-interactive --no-wait

      - name: Clean up service account key
        if: always() && inputs.submit && inputs.profile == 'production'
        working-directory: apps/mobile
        run: rm -f google-play-service-account.json

name: Deploy to VPS

on:
  push:
    branches: [development]
    paths:
      - 'apps/api/**'
      - 'apps/admin/**'
      - 'packages/shared-types/**'
      - 'packages/shared-utils/**'
      - 'docker/**'
      - 'docker-compose.prod.yml'
      - 'scripts/deploy.sh'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            cd /opt/ai-budget
            bash scripts/deploy.sh

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            echo "Waiting for API to become healthy (up to 90s)..."
            for i in $(seq 1 30); do
              code=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000/api/v1/health || echo "000")
              if [ "$code" = "200" ]; then
                echo "API healthy on attempt $i"
                curl -s http://localhost:3000/api/v1/health
                docker ps --filter name=budget
                exit 0
              fi
              echo "  ($i/30) /api/v1/health -> $code, retrying in 3s..."
              sleep 3
            done
            echo "ERROR: API did not become healthy in 90s" >&2
            docker ps -a --filter name=budget
            docker logs --tail 100 budget-api-prod || true
            exit 1

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Budget Assistant - Legal Documents</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #fff;
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        h1 {
            color: #1a1a1a;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 32px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        a {
            display: block;
            padding: 16px 24px;
            background: #f5f5f5;
            border-radius: 12px;
            text-decoration: none;
            color: #1a1a1a;
            font-weight: 500;
            transition: all 0.2s;
        }
        a:hover {
            background: #667eea;
            color: #fff;
            transform: translateY(-2px);
        }
        .lang-switch {
            margin-top: 24px;
        }
        .lang-switch a {
            display: inline-block;
            padding: 8px 16px;
            background: none;
            color: #667eea;
            font-size: 14px;
        }
        .lang-switch a:hover {
            background: none;
            color: #764ba2;
            transform: none;
        }
        .contact {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 14px;
        }
        .contact a {
            display: inline;
            background: none;
            padding: 0;
            color: #667eea;
        }
        .contact a:hover {
            background: none;
            color: #764ba2;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💰</div>
        <h1>AI Budget Assistant</h1>
        <p class="subtitle">Legal Documents</p>

        <div class="links">
            <a href="/en/privacy">Privacy Policy</a>
            <a href="/en/terms">Terms of Service</a>
        </div>

        <div class="lang-switch">
            <a href="/pl/">🇵🇱 Wersja polska</a>
        </div>

        <div class="contact">
            Questions? Contact us at<br>
            <a href="mailto:perevertkinma@gmail.com">perevertkinma@gmail.com</a>
        </div>
    </div>
</body>
</html>

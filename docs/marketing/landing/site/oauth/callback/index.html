<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex, nofollow"><title>Signing in...</title><style>body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;background:#000;color:#fff;text-align:center}p{opacity:.7;font-size:16px}a{display:none;margin-top:18px;padding:12px 22px;background:#F58320;color:#fff;text-decoration:none;border-radius:10px;font-weight:700;font-size:16px}</style></head><body><p id="m">Signing in, please wait...</p><a id="b" href="#">Open the app</a><script>var h=window.location.hash.replace(/^#/,'');var s=window.location.search.replace(/^\?/,'');var p=h||s;if(p){var t='budget://oauth?'+p;var b=document.getElementById('b');b.href=t;window.location.replace(t);setTimeout(function(){b.style.display='inline-block';document.getElementById('m').textContent='Tap to finish signing in';},1200);}</script></body></html>
